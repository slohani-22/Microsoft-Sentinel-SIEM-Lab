<svg width="100%" viewBox="0 0 680 640" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Microsoft Sentinel SIEM Lab — Architecture Diagram</title>
<desc>Architecture showing sentinel-vm feeding logs through DCR into Log Analytics Workspace, then into Microsoft Sentinel with connected components including Logic App playbook, data connectors, VNet flow logs, DNS logging, and Azure Firewall</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: Arial, sans-serif; fill: #1a1a1a; }
.th { font-size: 14px; font-weight: 600; }
.ts { font-size: 12px; font-weight: 400; fill: #444; }
.teal rect { fill: #E1F5EE; stroke: #0F6E56; }
.teal text { fill: #085041; }
.purple rect { fill: #EEEDFE; stroke: #534AB7; }
.purple text { fill: #3C3489; }
.blue rect { fill: #E6F1FB; stroke: #185FA5; }
.blue text { fill: #0C447C; }
.coral rect { fill: #FAECE7; stroke: #993C1D; }
.coral text { fill: #712B13; }
.amber rect { fill: #FAEEDA; stroke: #854F0B; }
.amber text { fill: #633806; }
.gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
.gray text { fill: #444441; }
line, path { stroke: #888; }
</style>
</defs>

<!-- section labels -->
<text class="ts" x="120" y="26" text-anchor="middle" font-style="italic">endpoint</text>
<text class="ts" x="340" y="130" text-anchor="middle" font-style="italic">ingestion</text>
<text class="ts" x="340" y="252" text-anchor="middle" font-style="italic">detection + response</text>
<text class="ts" x="120" y="418" text-anchor="middle" font-style="italic">network visibility</text>

<!-- sentinel-vm -->
<g class="teal">
<rect x="40" y="36" width="160" height="54" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="59" text-anchor="middle" dominant-baseline="central">sentinel-vm</text>
<text class="ts" x="120" y="77" text-anchor="middle" dominant-baseline="central">Windows Server 2022</text>
</g>

<!-- VM → DCR -->
<line x1="120" y1="90" x2="120" y2="140" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- sentinel-vmdcr -->
<g class="teal">
<rect x="40" y="140" width="160" height="54" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="163" text-anchor="middle" dominant-baseline="central">sentinel-vmdcr</text>
<text class="ts" x="120" y="181" text-anchor="middle" dominant-baseline="central">Data Collection Rule</text>
</g>

<!-- DCR → Workspace -->
<line x1="200" y1="167" x2="240" y2="167" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- sentinel-law-prodd -->
<g class="purple">
<rect x="240" y="140" width="200" height="54" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="163" text-anchor="middle" dominant-baseline="central">sentinel-law-prodd</text>
<text class="ts" x="340" y="181" text-anchor="middle" dominant-baseline="central">Log Analytics Workspace</text>
</g>

<!-- Workspace → Sentinel -->
<line x1="340" y1="194" x2="340" y2="262" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- Microsoft Sentinel -->
<g class="purple">
<rect x="240" y="262" width="200" height="54" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="285" text-anchor="middle" dominant-baseline="central">Microsoft Sentinel</text>
<text class="ts" x="340" y="303" text-anchor="middle" dominant-baseline="central">16 rules · 2 hunts · 1 workbook</text>
</g>

<!-- Sentinel → Playbook -->
<line x1="440" y1="289" x2="480" y2="289" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- Logic App Playbook -->
<g class="coral">
<rect x="480" y="262" width="168" height="54" rx="8" stroke-width="0.5"/>
<text class="th" x="564" y="282" text-anchor="middle" dominant-baseline="central">sentinel-incident</text>
<text class="th" x="564" y="300" text-anchor="middle" dominant-baseline="central">-response</text>
</g>
<text class="ts" x="564" y="328" text-anchor="middle" fill="#444">Graph API · Email · Comment</text>

<!-- Defender Portal -->
<g class="gray">
<rect x="240" y="364" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="382" text-anchor="middle" dominant-baseline="central">Defender Portal</text>
<text class="ts" x="340" y="399" text-anchor="middle" dominant-baseline="central">defender.microsoft.com</text>
</g>
<line x1="340" y1="316" x2="340" y2="364" stroke-width="1" stroke-dasharray="4 3" fill="none"/>

<!-- Data Connectors -->
<g class="blue">
<rect x="40" y="262" width="160" height="54" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="285" text-anchor="middle" dominant-baseline="central">Data Connectors</text>
<text class="ts" x="120" y="303" text-anchor="middle" dominant-baseline="central">11/11 connected</text>
</g>
<text class="ts" x="120" y="330" text-anchor="middle" fill="#444">Azure Activity · Entra ID</text>
<text class="ts" x="120" y="346" text-anchor="middle" fill="#444">Defender XDR · +8 more</text>

<!-- Connectors → Workspace (up and over) -->
<path d="M200 289 L216 289 L216 120 L340 120 L340 140" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- VNet Flow Logs -->
<g class="blue">
<rect x="40" y="428" width="160" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="446" text-anchor="middle" dominant-baseline="central">VNet Flow Logs</text>
<text class="ts" x="120" y="462" text-anchor="middle" dominant-baseline="central">Traffic Analytics</text>
</g>

<!-- VNet → Workspace -->
<path d="M200 450 L230 450 L230 194 L240 194" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

<!-- DNS Client Logs -->
<g class="blue">
<rect x="40" y="494" width="160" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="512" text-anchor="middle" dominant-baseline="central">DNS Client Logs</text>
<text class="ts" x="120" y="528" text-anchor="middle" dominant-baseline="central">via AMA · DCR XPath</text>
</g>

<!-- DNS → DCR dashed -->
<path d="M120 494 L120 194" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>

<!-- Azure Firewall -->
<g class="amber">
<rect x="480" y="428" width="168" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="564" y="446" text-anchor="middle" dominant-baseline="central">Azure Firewall</text>
<text class="ts" x="564" y="462" text-anchor="middle" dominant-baseline="central">56 network rule hits</text>
</g>

<!-- Firewall → Workspace -->
<path d="M564 428 L564 194 L440 194" stroke-width="1" marker-end="url(#arrow)" fill="none"/>

</svg>
